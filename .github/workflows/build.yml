name: Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
        echo "Using: $XCODE_PATH"
        sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Fix watchOS build settings
      run: |
        # Fix the watch target's build settings in the generated project
        # Use PlistBuddy to ensure the watch Info.plist has correct values
        /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily" BolusBuddyWatch/Info.plist 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily array" BolusBuddyWatch/Info.plist
        /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:0 integer 4" BolusBuddyWatch/Info.plist
        /usr/libexec/PlistBuddy -c "Delete :UIRequiredDeviceCapabilities" BolusBuddyWatch/Info.plist 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Delete :MinimumOSVersion" BolusBuddyWatch/Info.plist 2>/dev/null || true

        # Also patch the pbxproj to set correct TARGETED_DEVICE_FAMILY for watch target
        sed -i '' 's/TARGETED_DEVICE_FAMILY = "1,2";/TARGETED_DEVICE_FAMILY = 4;/g' BolusBuddy.xcodeproj/project.pbxproj

        # Set WATCHOS_DEPLOYMENT_TARGET in the project for the watch target
        cat BolusBuddyWatch/Info.plist

    - name: Install certificate and provisioning profiles
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        WATCH_PROVISION_PROFILE_BASE64: ${{ secrets.WATCH_PROVISION_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        IOS_PP_PATH=$RUNNER_TEMP/ios_pp.mobileprovision
        WATCH_PP_PATH=$RUNNER_TEMP/watch_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode -o $IOS_PP_PATH
        echo -n "$WATCH_PROVISION_PROFILE_BASE64" | base64 --decode -o $WATCH_PP_PATH

        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $IOS_PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
        cp $WATCH_PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

    - name: Build archive
      run: |
        xcodebuild -project BolusBuddy.xcodeproj \
          -scheme BolusBuddy \
          -archivePath $RUNNER_TEMP/BolusBuddy.xcarchive \
          -configuration Release \
          -destination "generic/platform=iOS" \
          clean archive \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
          ONLY_ACTIVE_ARCH=NO

    - name: Fix watch plist in archive
      run: |
        WATCH_APP=$(find $RUNNER_TEMP/BolusBuddy.xcarchive -name "BolusBuddy Watch App.app" -type d | head -1)
        if [ -n "$WATCH_APP" ]; then
          echo "Found watch app at: $WATCH_APP"
          /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily" "$WATCH_APP/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily array" "$WATCH_APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:0 integer 4" "$WATCH_APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :UIRequiredDeviceCapabilities" "$WATCH_APP/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 10.0" "$WATCH_APP/Info.plist" 2>/dev/null || true
          echo "Watch plist fixed:"
          /usr/libexec/PlistBuddy -c "Print :UIDeviceFamily" "$WATCH_APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$WATCH_APP/Info.plist"
          # Re-codesign the watch app after plist modification
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
          echo "Re-signing with: $SIGNING_IDENTITY"
          codesign --force --sign "$SIGNING_IDENTITY" --preserve-metadata=identifier,entitlements,flags "$WATCH_APP"
        else
          echo "WARNING: Watch app not found in archive"
        fi

    - name: Export IPA
      run: |
        cat > $RUNNER_TEMP/ExportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>com.kothari.BolusBuddy</key>
                <string>${{ secrets.IOS_PROFILE_NAME }}</string>
                <key>com.kothari.BolusBuddy.watchkitapp</key>
                <string>${{ secrets.WATCH_PROFILE_NAME }}</string>
            </dict>
        </dict>
        </plist>
        EOF

        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/BolusBuddy.xcarchive \
          -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
          -exportPath $RUNNER_TEMP/export

    - name: Upload to TestFlight
      env:
        APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      run: |
        mkdir -p ~/private_keys
        echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

        xcrun altool --upload-app \
          -f $RUNNER_TEMP/export/BolusBuddy.ipa \
          -t ios \
          --apiKey $APP_STORE_CONNECT_API_KEY_ID \
          --apiIssuer $APP_STORE_CONNECT_ISSUER_ID

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: BolusBuddy.ipa
        path: ${{ runner.temp }}/export/BolusBuddy.ipa
