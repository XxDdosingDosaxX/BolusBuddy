name: BolusBuddy
options:
  bundleIdPrefix: com.kothari
  xcodeVersion: "15.4"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    DEVELOPMENT_TEAM: 6PG65NU8X5
    CODE_SIGN_STYLE: Manual

targets:
  BolusBuddy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - BolusBuddy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kothari.BolusBuddy
        INFOPLIST_FILE: BolusBuddy/Info.plist
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "BolusBuddy App Store"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: BolusBuddy Watch App

  BolusBuddy Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: BolusBuddyWatch
        excludes:
          - "Assets.xcassets"
      - path: BolusBuddyWatch/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kothari.BolusBuddy.watchkitapp
        INFOPLIST_FILE: BolusBuddyWatch/Info.plist
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "BolusBuddy Watch App Store"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "4"
        ARCHS[sdk=watchos*]: "arm64_32 arm64"
        ARCHS[sdk=watchsimulator*]: "arm64"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SDKROOT: watchos
        SUPPORTS_MACCATALYST: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postBuildScripts:
      - name: Fix Watch Plist
        script: |
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconFiles" "${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconFiles array" "${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconFiles:0 string AppIcon" "${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}/Info.plist"
    entitlements:
      path: BolusBuddyWatch/BolusBuddyWatch.entitlements
